query ReciprocalAgreement($id: ID!) {
  reciprocalAgreement(id: $id) {
    id
    clubId
    partnerClubId
    status
    agreementType
    agreementTerms {
      maxVisitsPerMonth
      reciprocalFee
      blackoutDates
      specialConditions
    }
    effectiveDate
    expirationDate
    startDate
    endDate
    createdAt
    updatedAt
  }
}
