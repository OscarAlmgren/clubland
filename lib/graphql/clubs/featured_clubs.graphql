# The backend has no dedicated featuredClubs query; featured clubs are the
# clubs query filtered on isFeatured.
query FeaturedClubs($pagination: PaginationInput) {
  clubs(filter: { isFeatured: true }, pagination: $pagination) {
    nodes {
      id
      name
      slug
      description
      location
      address {
        street
        city
        state
        postalCode
        country
      }
      logo
      website
      status
      settings {
        allowReciprocal
        reciprocalFee
      }
      createdAt
      updatedAt
    }
    pageInfo {
      hasNextPage
    }
  }
}
