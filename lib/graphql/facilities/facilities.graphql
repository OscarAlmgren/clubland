query Facilities(
  $pagination: PaginationInput
  $type: FacilityType
  $isActive: Boolean
) {
  facilities(pagination: $pagination, type: $type, isActive: $isActive) {
    nodes {
      id
      clubId
      name
      description
      type
      capacity
      amenities
      status
      minBookingDuration
      maxBookingDuration
      advanceBookingDays
      cancellationDeadline
      operatingHours
      createdAt
      updatedAt
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
