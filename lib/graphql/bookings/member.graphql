query Member($id: ID!) {
  member(id: $id) {
    id
    clubId
    userId
    memberNumber
    membershipType
    status
    firstName
    lastName
    email
    phone
    dateOfBirth
    address {
      street
      city
      state
      postalCode
      country
    }
    emergencyContact {
      name
      relationship
      phone
    }
    preferences {
      receiveNewsletter
      receivePromotions
      allowDataSharing
      preferredLanguage
    }
    joinedDate
    createdAt
    updatedAt
  }
}
