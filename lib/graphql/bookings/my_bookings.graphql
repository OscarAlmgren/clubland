query MyBookings($pagination: PaginationInput, $status: BookingStatus) {
  myFacilityBookings(pagination: $pagination, status: $status) {
    nodes {
      id
      clubId
      facilityId
      memberId
      startTime
      endTime
      status
      purpose
      guestCount
      paymentStatus
      facility {
        id
        name
        type
      }
      createdAt
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
