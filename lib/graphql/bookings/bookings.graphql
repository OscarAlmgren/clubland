query Bookings(
  $pagination: PaginationInput
  $status: BookingStatus
  $startDate: Time
  $endDate: Time
) {
  facilityBookings(
    pagination: $pagination
    status: $status
    startDate: $startDate
    endDate: $endDate
  ) {
    nodes {
      id
      clubId
      facilityId
      memberId
      facility {
        id
        name
        type
      }
      startTime
      endTime
      status
      purpose
      guestCount
      paymentStatus
      createdAt
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
