query Booking($id: ID!) {
  facilityBooking(id: $id) {
    id
    clubId
    facilityId
    memberId
    facility {
      id
      name
      type
      capacity
    }
    startTime
    endTime
    status
    purpose
    guestCount
    specialRequests
    totalCost
    currency
    paymentStatus
    checkInTime
    checkOutTime
    cancellationReason
    cancelledAt
    createdAt
    updatedAt
  }
}
