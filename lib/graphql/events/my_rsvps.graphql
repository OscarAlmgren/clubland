query MyRSVPs($pagination: PaginationInput, $status: RSVPStatus) {
  myEventRSVPs(pagination: $pagination, status: $status) {
    nodes {
      id
      eventId
      memberId
      clubId
      response
      rsvpType
      priority
      attendanceCount
      guestNames
      dietaryRestrictions
      seatingPreferences
      specialRequests
      status
      guestCount
      paymentStatus
      paymentRequired
      paymentVerified
      paymentAmount
      cancellationFee
      feeWaived
      waitlistPosition
      rsvpedAt
      updatedAt
      cancelledAt
      cancellationReason
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
