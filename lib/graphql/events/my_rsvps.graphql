query MyRSVPs($pagination: PaginationInput, $status: RSVPStatus) {
  myEventRSVPs(pagination: $pagination, status: $status) {
    nodes {
      id
      eventId
      memberId
      clubId
      status
      guestCount
      dietaryRestrictions
      specialRequests
      paymentStatus
      response
      attendanceCount
      cancellationFee
      feeWaived
      rsvpedAt
      updatedAt
      cancelledAt
      cancellationReason
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
