query GetEvents(
  $pagination: PaginationInput
  $status: EventStatus
  $type: ClubEventType
  $startDate: Time
  $endDate: Time
) {
  events(
    pagination: $pagination
    status: $status
    type: $type
    startDate: $startDate
    endDate: $endDate
  ) {
    nodes {
      id
      clubId
      name
      title
      description
      type
      eventType
      startTime
      endTime
      location
      imageUrl
      capacity
      currentAttendees
      availableSpots
      tentativeCount
      waitlistCount
      requiresApproval
      requiresPayment
      price
      cancellationDeadline
      rsvpDeadline
      organizerName
      contactEmail
      contactPhone
      paymentInstructions
      createdAt
      updatedAt
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
