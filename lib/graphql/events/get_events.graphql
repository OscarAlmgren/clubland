query GetEvents(
  $pagination: PaginationInput
  $status: EventStatus
  $type: ClubEventType
  $startDate: Time
  $endDate: Time
) {
  events(
    pagination: $pagination
    status: $status
    type: $type
    startDate: $startDate
    endDate: $endDate
  ) {
    nodes {
      id
      clubId
      title
      description
      eventType
      startTime
      endTime
      location
      imageUrl
      capacity
      currentAttendees
      availableSpots
      tentativeCount
      waitlistCount
      guestPolicy
      maxGuestsPerMember
      requiresApproval
      requiresPayment
      price
      cancellationDeadline
      freeCancellationDays
      cancellationFeePercentage
      allowsSubgroupPriority
      fullHouseExclusive
      rsvpDeadline
      subgroupId
      organizerName
      contactEmail
      contactPhone
      paymentInstructions
      createdAt
      updatedAt
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
