mutation CreateRSVP($input: CreateRSVPInput!) {
  createEventRSVP(input: $input) {
    id
    eventId
    memberId
    clubId
    status
    guestCount
    dietaryRestrictions
    specialRequests
    paymentStatus
    response
    rsvpType
    priority
    attendanceCount
    guestNames
    seatingPreferences
    paymentRequired
    paymentVerified
    paymentAmount
    cancellationFee
    feeWaived
    waitlistPosition
    rsvpedAt
    updatedAt
    cancelledAt
    cancellationReason
    approvedBy
    approvedAt
    declineReason
  }
}
