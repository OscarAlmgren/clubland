query Proposals(
  $pagination: PaginationInput
  $status: ProposalStatus
  $type: ProposalType
) {
  proposals(pagination: $pagination, status: $status, type: $type) {
    nodes {
      id
      title
      description
      type
      status
      category
      votingStartTime
      votingEndTime
      totalVotes
      votesYay
      votesNay
      votesAbstain
      createdAt
      proposer {
        id
        firstName
        lastName
      }
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
