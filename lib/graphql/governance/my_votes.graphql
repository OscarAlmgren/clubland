query MyVotes($pagination: PaginationInput) {
  myVotes(pagination: $pagination) {
    nodes {
      id
      proposalId
      voteValue
      weight
      comments
      isAnonymous
      castAt
      createdAt
    }
    pageInfo {
      page
      pageSize
      total
      totalPages
      hasNextPage
      hasPrevPage
    }
  }
}
