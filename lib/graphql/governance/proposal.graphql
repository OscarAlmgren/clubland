query Proposal($id: ID!) {
  proposal(id: $id) {
    id
    title
    description
    type
    status
    category
    votingMethod
    votingStartTime
    votingEndTime
    quorumRequired
    approvalThreshold
    totalVotes
    votesYay
    votesNay
    votesAbstain
    createdAt
    updatedAt
    proposer {
      id
      firstName
      lastName
      email
    }
    votes {
      id
      voteValue
      weight
      comments
      isAnonymous
      castAt
      voter {
        id
        firstName
        lastName
      }
    }
  }
}
