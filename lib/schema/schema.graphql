}

enum TransactionType {
  MEMBER_REGISTRATION
  VISIT_RECORD
  AGREEMENT_CREATION
  PAYMENT_RECORD
}

enum TransactionStatus {
  PENDING
  SUBMITTED
  CONFIRMED
  FAILED
}

