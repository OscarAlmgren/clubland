  # Visits
  visits(pagination: PaginationInput, status: VisitStatus, startDate: Time, endDate: Time): VisitConnection!
  visit(id: ID!): Visit
  visitsByMember(memberId: ID!, pagination: PaginationInput): VisitConnection!
  visitsByClub(clubId: ID!, asHost: Boolean = true, pagination: PaginationInput): VisitConnection!
  activeVisits: [Visit!]!
}

extend type Mutation {
  # Member Management
  createMember(input: CreateMemberInput!): Member!
  updateMember(id: ID!, input: UpdateMemberInput!): Member!
  suspendMember(id: ID!, reason: String!): Member!
  reactivateMember(id: ID!): Member!
  deleteMember(id: ID!): Boolean!
  renewMembership(id: ID!, expiryDate: Time!): Member!

  # Agreement Management
  createReciprocalAgreement(input: CreateAgreementInput!): ReciprocalAgreement!
  updateReciprocalAgreement(id: ID!, input: UpdateAgreementInput!): ReciprocalAgreement!
  activateAgreement(id: ID!): ReciprocalAgreement!
  suspendAgreement(id: ID!, reason: String!): ReciprocalAgreement!
  cancelAgreement(id: ID!, reason: String!): ReciprocalAgreement!

  # Visit Management
  checkIn(input: CheckInInput!): Visit!
  checkOut(visitId: ID!, input: CheckOutInput!): Visit!
  cancelVisit(visitId: ID!, reason: String!): Visit!
  generateVisitQRCode(visitId: ID!): String!
  verifyVisit(qrCode: String!): Visit
}

extend type Subscription {
  # Real-time visit notifications
  visitCheckedIn(clubId: ID!): Visit!
  visitCheckedOut(clubId: ID!): Visit!
}

# --- internal/graphql/schema/notification.graphql ---
# Notification Management Schema
# Includes templates, preferences, and multi-channel delivery

type Notification {
  id: ID!
  clubId: ID!
  userId: ID!
  channel: NotificationChannel!
  priority: NotificationPriority!
  status: NotificationStatus!
  title: String!
  body: String!
  templateId: ID
  templateData: JSON
  scheduledFor: Time
  expiresAt: Time
  sentAt: Time
  deliveredAt: Time
  readAt: Time
  createdAt: Time!
  updatedAt: Time!
  template: NotificationTemplate
}

enum NotificationChannel {
  EMAIL
  SMS
  PUSH
  IN_APP
  WEBHOOK
}

enum NotificationPriority {
  LOW
  NORMAL
  HIGH
  CRITICAL
}

enum NotificationStatus {
  PENDING
  SENT
  DELIVERED
  FAILED
  READ
}

# Notification Templates
type NotificationTemplate {
  id: ID!
  clubId: ID!
  name: String!
  channel: NotificationChannel!
  bodyTemplate: String!
  htmlTemplate: String
  variables: [String!]!
  isActive: Boolean!
  createdAt: Time!
  updatedAt: Time!
}

input CreateNotificationTemplateInput {
  name: String!
  channel: NotificationChannel!
  bodyTemplate: String!
  htmlTemplate: String
  variables: [String!]!
}

input UpdateNotificationTemplateInput {
  name: String
  bodyTemplate: String
  htmlTemplate: String
  variables: [String!]
  isActive: Boolean
}

# User Notification Preferences
type NotificationPreference {
  id: ID!
  clubId: ID!
  userId: ID!
  emailEnabled: Boolean!
  smsEnabled: Boolean!
  pushEnabled: Boolean!
  inAppEnabled: Boolean!
  quietHoursEnabled: Boolean!
  quietHoursStart: String
  quietHoursEnd: String
  digestEnabled: Boolean!
  digestFrequency: String
  createdAt: Time!
  updatedAt: Time!
}

input UpdateNotificationPreferenceInput {
  emailEnabled: Boolean
  smsEnabled: Boolean
  pushEnabled: Boolean
  inAppEnabled: Boolean
  quietHoursEnabled: Boolean
  quietHoursStart: String
  quietHoursEnd: String
  digestEnabled: Boolean
  digestFrequency: String
}

# Input types
input SendNotificationInput {
  userId: ID!
  channel: NotificationChannel!
  priority: NotificationPriority = NORMAL
  title: String!
  body: String!
  templateId: ID
  templateData: JSON
  scheduledFor: Time
  expiresAt: Time
}

input BulkNotificationInput {
  userIds: [ID!]!
  channel: NotificationChannel!
  priority: NotificationPriority = NORMAL
  title: String!
  body: String!
  templateId: ID
  templateData: JSON
}

# Pagination
type NotificationConnection {
  nodes: [Notification!]!
  pageInfo: PageInfo!
}

type NotificationTemplateConnection {
  nodes: [NotificationTemplate!]!
  pageInfo: PageInfo!
}

extend type Query {
  # Notifications
  notifications(pagination: PaginationInput, status: NotificationStatus, unreadOnly: Boolean = false): NotificationConnection!
  notification(id: ID!): Notification
  pendingNotifications(limit: Int = 10): [Notification!]!
  unreadNotificationCount: Int!

  # Templates
  notificationTemplates(pagination: PaginationInput, channel: NotificationChannel): NotificationTemplateConnection!
  notificationTemplate(id: ID!): NotificationTemplate

  # Preferences
  notificationPreferences: NotificationPreference
  userNotificationPreferences(userId: ID!): NotificationPreference
}

extend type Mutation {
  # Notifications
  sendNotification(input: SendNotificationInput!): Notification!
  sendBulkNotifications(input: BulkNotificationInput!): [Notification!]!
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: Boolean!

  # Templates
  createNotificationTemplate(input: CreateNotificationTemplateInput!): NotificationTemplate!
  updateNotificationTemplate(id: ID!, input: UpdateNotificationTemplateInput!): NotificationTemplate!
  deleteNotificationTemplate(id: ID!): Boolean!

  # Preferences
  updateNotificationPreferences(input: UpdateNotificationPreferenceInput!): NotificationPreference!
}

extend type Subscription {
  # Real-time notification delivery
  notificationReceived: Notification!
}

