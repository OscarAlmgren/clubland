scalar Time

# Authentication types
type User {
  id: ID!
  clubId: ID!
  email: String!
  username: String!
  firstName: String
  lastName: String
  status: UserStatus!
  roles: [String!]!
  permissions: [String!]!
  createdAt: Time!
  updatedAt: Time!
}

enum UserStatus {
  ACTIVE
  INACTIVE
  SUSPENDED
  PENDING_VERIFICATION
}

type AuthPayload {
  token: String!
  refreshToken: String!
  user: User!
  expiresAt: Time!
}

# Member types
type Member {
  id: ID!
  clubId: ID!
  userId: ID!
  memberNumber: String!
  membershipType: MembershipType!
  status: MemberStatus!
  blockchainIdentity: String
  profile: MemberProfile
  joinedAt: Time!
  createdAt: Time!
  updatedAt: Time!
}

enum MembershipType {
  REGULAR
  PREMIUM
  LIFETIME
  CORPORATE
}

enum MemberStatus {
  ACTIVE
  INACTIVE
  SUSPENDED
  PENDING
}

type MemberProfile {
  firstName: String!
  lastName: String!
  dateOfBirth: Time
  phoneNumber: String
  address: Address
  emergencyContact: EmergencyContact
  preferences: MemberPreferences
}

type Address {
  street: String!
  city: String!
  state: String!
  postalCode: String!
  country: String!
}

type EmergencyContact {
  name: String!
  relationship: String!
  phoneNumber: String!
}

type MemberPreferences {
  emailNotifications: Boolean!
  smsNotifications: Boolean!
  pushNotifications: Boolean!
