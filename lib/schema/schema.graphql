# Pagination
input PaginationInput {
  page: Int = 1
  pageSize: Int = 10
  first: Int
  after: String
}

type PageInfo {
  page: Int!
  pageSize: Int!
  total: Int!
  totalPages: Int!
  hasNextPage: Boolean!
  hasPrevPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

type MemberConnection {
  nodes: [Member!]!
  pageInfo: PageInfo!
}

type ReciprocalAgreementConnection {
  nodes: [ReciprocalAgreement!]!
  pageInfo: PageInfo!
}

type VisitConnection {
  nodes: [Visit!]!
  pageInfo: PageInfo!
}

type NotificationConnection {
  nodes: [Notification!]!
  pageInfo: PageInfo!
}

type ProposalConnection {
  nodes: [Proposal!]!
  pageInfo: PageInfo!
}

type BookingConnection {
  nodes: [Booking!]!
  pageInfo: PageInfo!
}

type ClubConnection {
  nodes: [Club!]!
  pageInfo: PageInfo!
}

type FacilityConnection {
  nodes: [Facility!]!
  pageInfo: PageInfo!
}

type EventEdge {
  node: Event!
  cursor: String!
}

type EventConnection {
  nodes: [Event!]!
  edges: [EventEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type RSVPEdge {
  node: RSVP!
  cursor: String!
}

type RSVPConnection {
  nodes: [RSVP!]!
  edges: [RSVPEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ReviewConnection {
  nodes: [Review!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# Root types
type Query {
  # Authentication
  me: User
  
  # Members
  members(pagination: PaginationInput, status: MemberStatus): MemberConnection!
  member(id: ID!): Member
  memberByNumber(memberNumber: String!): Member
  
  # Clubs
  clubs(filter: ClubFilterInput, pagination: PaginationInput): ClubConnection!
  club(id: ID, slug: String): Club
  myClub: Club
  featuredClubs(pagination: PaginationInput): ClubConnection!
  nearbyClubs(latitude: Float!, longitude: Float!, radius: Float, pagination: PaginationInput): ClubConnection!
  searchClubs(query: String!, location: LocationInput, radius: Float, amenities: [String!], pagination: PaginationInput): ClubConnection!
  clubReviews(clubId: ID!, pagination: PaginationInput): ReviewConnection!

  # Facilities
  facilities(filter: FacilityFilterInput, pagination: PaginationInput): FacilityConnection!
  facility(id: ID!): Facility
  facilityTypes: [String!]!

  # Bookings
  bookings(filter: BookingFilterInput, pagination: PaginationInput): BookingConnection!
  booking(id: ID!): Booking
  myBookings(filter: BookingFilterInput, pagination: PaginationInput): BookingConnection!
  upcomingBookings(days: Int, pagination: PaginationInput): BookingConnection!
  facilityBookings(facilityId: ID!, startDate: Time!, endDate: Time!, pagination: PaginationInput): BookingConnection!

  # Availability
  checkAvailability(facilityId: ID!, startTime: Time!, endTime: Time!, excludeBookingId: ID): Boolean!
  availableSlots(facilityId: ID!, date: Time!, slotDuration: Int!): [TimeSlot!]!

  # Statistics
  bookingStatistics(startDate: Time!, endDate: Time!): BookingStatistics!
  facilityUtilization(facilityId: ID!, startDate: Time!, endDate: Time!): FacilityUtilization!
  
  # Reciprocal agreements
  reciprocalAgreements(pagination: PaginationInput, status: AgreementStatus): ReciprocalAgreementConnection!
  reciprocalAgreement(id: ID!): ReciprocalAgreement
  
  # Visits
  visits(pagination: PaginationInput, status: VisitStatus): VisitConnection!
  visit(id: ID!): Visit
  myVisits(pagination: PaginationInput): VisitConnection!
  
  # Notifications
  notifications(pagination: PaginationInput, unreadOnly: Boolean = false): NotificationConnection!
  notification(id: ID!): Notification
  unreadNotificationCount: Int!
  
  # Analytics
  analytics(startDate: Time, endDate: Time): Analytics!
  
  # Governance
  proposals(pagination: PaginationInput, status: ProposalStatus): ProposalConnection!
  proposal(id: ID!): Proposal
  myVotes(proposalId: ID): [Vote!]!
  
  # Events/RSVPs
  events(clubId: ID, filter: EventFilterInput, filters: EventFilters, pagination: PaginationInput): EventConnection!
  event(id: ID!): Event
  myRSVPs(clubId: ID, status: [RSVPStatus!], pagination: PaginationInput): RSVPConnection!
  checkRSVPEligibility(eventId: ID!, memberId: ID!): RSVPEligibility!
  findingFriendsSubgroups(clubId: ID!): [Subgroup!]!
  
  # Blockchain
  transactions(pagination: PaginationInput, status: TransactionStatus): [Transaction!]!
  transaction(id: ID!): Transaction
}

type Mutation {
  # Authentication
  login(input: LoginInput!): AuthPayload!
  register(input: RegisterInput!): AuthPayload!
  refreshToken(refreshToken: String!): AuthPayload!
  logout: Boolean!

  # Passkey Authentication
  initiatePasskeyLogin(email: String!, clubSlug: String!): PasskeyLoginInit!
  completePasskeyLogin(clubSlug: String!, userId: String!, credential: PasskeyCredentialInput!): AuthPayload!
  initiatePasskeyRegistration: PasskeyRegistrationInit!
  completePasskeyRegistration(credential: PasskeyCredentialInput!): Boolean!
  syncUser: User!

  # User Management
  updateUser(id: ID!, firstName: String, lastName: String, status: UserStatus): User!

  # Clubs
  createClub(input: CreateClubInput!): Club!
  updateClub(clubId: ID!, input: UpdateClubInput!): Club!
  checkInToClub(clubId: ID!): CheckInResponse!
  toggleFavoriteClub(clubId: ID!): Boolean!

  # Members
  createMember(input: CreateMemberInput!): Member!
  updateMember(id: ID!, input: MemberProfileInput!): Member!
  suspendMember(id: ID!, reason: String): Member!
  reactivateMember(id: ID!): Member!

  # Facilities
  createFacility(input: CreateFacilityInput!): Facility!
  updateFacility(id: ID!, input: UpdateFacilityInput!): Facility!
  deleteFacility(id: ID!): Boolean!

  # Bookings
  createBooking(input: CreateBookingInput!): Booking!
  updateBooking(id: ID!, input: UpdateBookingInput!): Booking!
  cancelBooking(bookingId: ID!, reason: String): Booking!
  confirmBooking(bookingId: ID!): Booking!
  completeBooking(bookingId: ID!): Booking!
  markBookingNoShow(bookingId: ID!): Booking!
  checkInBooking(bookingId: ID!): Booking!
  checkOutBooking(bookingId: ID!): Booking!
  
  # Reciprocal agreements
  createReciprocalAgreement(input: CreateReciprocalAgreementInput!): ReciprocalAgreement!
  approveReciprocalAgreement(id: ID!): ReciprocalAgreement!
  rejectReciprocalAgreement(id: ID!, reason: String): ReciprocalAgreement!
  suspendReciprocalAgreement(id: ID!, reason: String): ReciprocalAgreement!
  
  # Visits
  recordVisit(input: RecordVisitInput!): Visit!
  checkOutVisit(input: CheckOutVisitInput!): Visit!
  cancelVisit(id: ID!, reason: String): Visit!
  verifyVisit(id: ID!): Visit!
  
  # Notifications
  createNotification(input: CreateNotificationInput!): Notification!
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: Boolean!
  
  # Governance
  createProposal(input: CreateProposalInput!): Proposal!
  castVote(input: CastVoteInput!): Vote!
  finalizeProposal(id: ID!): Proposal!
  
  # Events/RSVPs
  createRSVP(eventId: ID!, input: CreateRSVPInput!): RSVP!
  updateRSVP(id: ID!, input: UpdateRSVPInput!): RSVP!
  cancelRSVP(id: ID!): CancelRSVPResponse!
  
  # System
  syncBlockchainData: Boolean!
  generateAnalyticsReport(startDate: Time!, endDate: Time!): String!
}

type Subscription {
  # Notifications
  notificationReceived: Notification!

  # Bookings
  bookingUpdates(userId: ID): Booking!

  # Visits
  visitStatusChanged(clubId: ID): Visit!

  # Governance
  proposalUpdated(proposalId: ID): Proposal!
  voteReceived(proposalId: ID): Vote!

  # Blockchain
  transactionStatusChanged: Transaction!
}