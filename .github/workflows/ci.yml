name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FLUTTER_VERSION: "3.43.0-0.3.pre"  # must satisfy pubspec sdk: ^3.10.0

jobs:
  schema-sync:
    runs-on: ubuntu-latest
    name: Cross-repo schema sync check
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Checkout backend (schema source of truth)
        uses: actions/checkout@v4
        with:
          repository: OscarAlmgren/reciprocal-clubs-backend
          path: backend
          # For a private backend repo, add a PAT with repo:read scope:
          # token: ${{ secrets.BACKEND_REPO_TOKEN }}

      - name: Verify lib/schema/schema.graphql matches backend export
        run: BACKEND_REPO=backend ./scripts/sync-schema.sh --check

  analyze:
    runs-on: ubuntu-latest
    name: Code Analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter packages pub run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run custom lints
        run: dart run custom_lint

  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter packages pub run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Run tests with coverage
        run: flutter test --coverage --reporter github

      - name: Generate coverage report
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info -o coverage/html

      - name: Upload coverage to Codecov
        # Best-effort: the enforced gate is the local threshold check below.
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

      - name: Check coverage threshold
        # Generated code (~75% of lib/ lines) is excluded so the gate
        # measures hand-written code. Ratchet baseline: 35% (actual was
        # 38.4% when introduced, 2026-07-13). Raise as coverage grows;
        # long-term target is 80%.
        run: |
          lcov --ignore-errors unused --remove coverage/lcov.info \
            '*.g.dart' '*.graphql.dart' '*.freezed.dart' '*/generated/*' \
            -o coverage/lcov.filtered.info
          COVERAGE=$(lcov --summary coverage/lcov.filtered.info | grep lines | grep -o '[0-9.]*%' | head -1 | sed 's/%//')
          echo "Coverage (generated code excluded): ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 35" | bc -l) )); then
            echo "Coverage dropped below the 35% ratchet baseline"
            exit 1
          fi

  integration_test:
    runs-on: ubuntu-latest
    name: Integration Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter packages pub run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Run integration tests
        run: flutter test test/integration/

  build_web:
    runs-on: ubuntu-latest
    name: Build Web
    needs: [analyze, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter packages pub run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Build for web
        run: flutter build web --release --dart-define=ENVIRONMENT=production

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build_android:
    runs-on: ubuntu-latest
    name: Build Android
    needs: [analyze, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter packages pub run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Build APK
        run: flutter build apk --release --dart-define=ENVIRONMENT=production

      - name: Build App Bundle
        run: flutter build appbundle --release --dart-define=ENVIRONMENT=production

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build_ios:
    runs-on: macos-latest
    name: Build iOS
    needs: [analyze, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: |
          flutter packages pub run build_runner build --delete-conflicting-outputs
          dart run intl_utils:generate

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --dart-define=ENVIRONMENT=production

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app

  security_scan:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'beta'

      - name: Get dependencies
        run: flutter pub get

      - name: Check for outdated/discontinued dependencies
        run: dart pub outdated || true

      - name: Check for hardcoded secrets
        # No base/head: on push-to-main events base==HEAD makes the action
        # error out. Mirror the backend config: full scan, verified results.
        uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          extra_args: --results=verified

  # Web hosting deploy removed with the Firebase purge — pick a non-Firebase
  # hosting target before reintroducing deploy jobs here.

  notify:
    runs-on: ubuntu-latest
    name: Notify Team
    needs: [build_web, build_android, build_ios]
    if: always()
    steps:
      - name: Send Slack notification
        # Best-effort: absent SLACK_WEBHOOK must not mark the pipeline red.
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}